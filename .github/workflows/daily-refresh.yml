

name: Daily Refresh
run-name: Daily Refresh (${{ github.event.inputs.market || 'all' }})

on:
  workflow_dispatch:
    inputs:
      refresh_financials:
        description: "Financial statement refresh mode"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - always
          - never
      market:
        description: "Market side to refresh and rebuild"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - kr
          - us
      asof:
        description: "Force refresh date, YYYYMMDD. Example: 20260615. Leave blank for auto."
        required: false
        default: ""
        type: string

  schedule:
    # 22:30 UTC = 07:30 Korea time, Tuesday-Saturday. This is after the US close.
    - cron: "30 22 * * 1-5"

permissions:
  contents: write
  actions: read

jobs:
  refresh-and-publish:
    runs-on: windows-latest
    timeout-minutes: 330
    env:
      OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      GITHUB_TOKEN: ${{ github.token }}
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"

    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: app

      - name: Checkout dashboard state
        uses: actions/checkout@v4
        with:
          ref: dashboard-state
          path: app/.dashboard-state

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure git identity
        shell: pwsh
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000

      - name: Install dependencies
        shell: pwsh
        working-directory: app
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Restore dashboard state
        shell: pwsh
        working-directory: app
        run: |
          python scripts\unpack_dashboard_state.py --state-dir .dashboard-state

      - name: Collect and rebuild without publishing
        shell: pwsh
        working-directory: app
        run: |
          $mode = "${{ github.event.inputs.refresh_financials || 'auto' }}"
          if (-not $mode) { $mode = "auto" }

          $market = "${{ github.event.inputs.market || 'all' }}"
          if (-not $market) { $market = "all" }

          $asof = "${{ github.event.inputs.asof || '' }}"

          $pipelineArgs = @(
            "scripts\refresh_dashboard_pipeline.py",
            "--refresh-financials", $mode,
            "--market", $market,
            "--skip-push",
            "--serial-markets",
            "--model-jobs", "1"
          )

          if ($asof) {
            Write-Host "Running pipeline with forced asof=$asof"
            $pipelineArgs += @("--asof", $asof)
          } else {
            Write-Host "Running pipeline with automatic asof"
          }

          python @pipelineArgs

      - name: Validate generated KR dates
        shell: pwsh
        working-directory: app
        run: |
          $asof = "${{ github.event.inputs.asof || '' }}"
          $market = "${{ github.event.inputs.market || 'all' }}"
          if (-not $market) { $market = "all" }

          if ($market -eq "us") {
            Write-Host "US-only refresh selected. Skipping KR date validation."
            exit 0
          }

          if ($asof) {
            $expected = [datetime]::ParseExact($asof, "yyyyMMdd", $null).ToString("yyyy-MM-dd")
            Write-Host "Expected KR latest date from manual asof: $expected"
          } else {
            $expected = ""
            Write-Host "No manual asof supplied. Date validation will print diagnostics only."
          }

          $env:EXPECTED_KR_DATE = $expected

          @'
          import json
          import os
          import sys
          from pathlib import Path

          import pandas as pd


          def max_date_from_csv(path: str, column: str) -> str:
              p = Path(path)
              if not p.exists():
                  print(f"{path}: MISSING")
                  return ""

              header = pd.read_csv(p, nrows=0)
              if column not in header.columns:
                  print(f"{path}: column {column!r} not found")
                  return ""

              df = pd.read_csv(p, usecols=[column])
              if df.empty:
                  print(f"{path}: EMPTY")
                  return ""

              value = pd.to_datetime(df[column], errors="coerce").max()
              if pd.isna(value):
                  print(f"{path}: no valid dates")
                  return ""

              result = value.strftime("%Y-%m-%d")
              print(f"{path}: max {column} = {result}")
              return result


          kr_price_date = max_date_from_csv(
              "data/raw/krx_ohlcv_kospi_kosdaq_state.csv",
              "date",
          )

          kr_wf_date = max_date_from_csv(
              "outputs/walkforward_warning_macro_kr_latest_auto/walkforward_scores.csv",
              "date",
          )

          manifest_path = Path("outputs/lgbm_warning_dashboard_macro_kr_latest/manifest.json")
          kr_manifest_latest = ""

          if manifest_path.exists():
              manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
              kr_manifest_latest = str(manifest.get("latest", ""))
              print(f"{manifest_path}: latest = {kr_manifest_latest}")
              print(f"{manifest_path}: dateCount = {manifest.get('dateCount')}")
              print(f"{manifest_path}: latestRows = {manifest.get('latestRows')}")
          else:
              print(f"{manifest_path}: MISSING")

          expected = os.environ.get("EXPECTED_KR_DATE", "").strip()

          if expected:
              failures = []

              if not kr_price_date or kr_price_date < expected:
                  failures.append(
                      f"KR raw price state did not reach {expected}. Actual max date: {kr_price_date or 'MISSING'}"
                  )

              if not kr_wf_date or kr_wf_date < expected:
                  failures.append(
                      f"KR walkforward scores did not reach {expected}. Actual max date: {kr_wf_date or 'MISSING'}"
                  )

              if not kr_manifest_latest or kr_manifest_latest < expected:
                  failures.append(
                      f"KR dashboard manifest did not reach {expected}. Actual latest: {kr_manifest_latest or 'MISSING'}"
                  )

              if failures:
                  for failure in failures:
                      print(f"::error::{failure}")
                  sys.exit(1)

              print(f"KR validation passed. Dashboard reached {expected}.")
          '@ | python -

      - name: Pack dashboard state
        shell: pwsh
        working-directory: app
        run: |
          python scripts\pack_dashboard_state.py --state-dir .dashboard-state

      - name: Inspect dashboard state
        shell: pwsh
        working-directory: app
        run: |
          Write-Host "Git status:"
          git -C .dashboard-state status --short

          Write-Host "Recent dashboard-state commits:"
          git -C .dashboard-state log --oneline -3

          Write-Host "Largest files in dashboard state:"
          Get-ChildItem .dashboard-state -Recurse -File |
            Where-Object { $_.FullName -notmatch "\\.git\\" } |
            Sort-Object Length -Descending |
            Select-Object -First 20 FullName, Length

      - name: Create dashboard state backup zip
        shell: pwsh
        working-directory: app
        run: |
          if (Test-Path dashboard-state-backup.zip) {
            Remove-Item dashboard-state-backup.zip -Force
          }

          $items = Get-ChildItem .dashboard-state -Force |
            Where-Object { $_.Name -ne ".git" }

          Compress-Archive -Path $items.FullName -DestinationPath dashboard-state-backup.zip -Force

          Write-Host "Created dashboard-state-backup.zip"
          Get-Item dashboard-state-backup.zip | Select-Object FullName, Length

      - name: Upload dashboard state artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-state-backup
          path: app/dashboard-state-backup.zip
          retention-days: 7

      - name: Publish GitHub Pages
        shell: pwsh
        working-directory: app
        run: |
          python scripts\build_pages_deploy.py --days 22 --push

      - name: Push dashboard state
        shell: pwsh
        working-directory: app/.dashboard-state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config http.version HTTP/1.1
          git config http.postBuffer 524288000

          git add -A

          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No dashboard state changes to commit."
          } else {
            git commit -m "Refresh dashboard state"
          }

          git gc --prune=now

          $pushOk = $false
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            Write-Host "Dashboard state push attempt $attempt of 3"

            git push origin HEAD:dashboard-state

            if ($LASTEXITCODE -eq 0) {
              $pushOk = $true
              Write-Host "Dashboard state push succeeded."
              break
            }

            Write-Warning "Dashboard state push failed on attempt $attempt."
            Start-Sleep -Seconds (30 * $attempt)
          }

          if (-not $pushOk) {
            Write-Warning "Dashboard state push failed after retries."
            Write-Warning "Pages was already published. The workflow will stay green."
            Write-Warning "Download the dashboard-state-backup artifact from this run and restore it manually if needed."
          }
