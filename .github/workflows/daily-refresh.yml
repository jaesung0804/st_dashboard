name: Daily Refresh

on:
  workflow_dispatch:
    inputs:
      refresh_financials:
        description: "Financial statement refresh mode"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - always
          - never
  schedule:
    # 22:30 UTC = 07:30 Korea time, Tuesday-Saturday. This is after the US close.
    - cron: "30 22 * * 1-5"

permissions:
  contents: write

jobs:
  refresh-and-publish:
    runs-on: windows-latest
    timeout-minutes: 330
    env:
      OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: app

      - name: Checkout dashboard state
        uses: actions/checkout@v4
        with:
          ref: dashboard-state
          path: app/.dashboard-state

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        working-directory: app
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Restore dashboard state
        shell: pwsh
        working-directory: app
        run: |
          python scripts\unpack_dashboard_state.py --state-dir .dashboard-state

      - name: Collect, rebuild, and publish
        shell: pwsh
        working-directory: app
        run: |
          $mode = "${{ github.event.inputs.refresh_financials }}"
          if (-not $mode) { $mode = "auto" }
          python scripts\refresh_dashboard_pipeline.py --refresh-financials $mode

      - name: Pack dashboard state
        shell: pwsh
        working-directory: app
        run: |
          python scripts\pack_dashboard_state.py --state-dir .dashboard-state

      - name: Push dashboard state
        shell: pwsh
        working-directory: app/.dashboard-state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Refresh dashboard state" || Write-Host "No dashboard state changes to commit."
          git push origin HEAD:dashboard-state
